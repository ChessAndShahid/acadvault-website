  <main class="py-5">
  <div class="container container-sm">
  <div class="text-center mb-4">
    <img src="assets/img/logo.png" width="60" class="mb-3 d-block mx-auto">
    <h2 class="mb-4">Verify Certificate</h2>
    <p class="text-muted mx-auto text-center" style="max-width: 100%;">
  R.D. & S.H. National College — AcadVault
</p>
  </div>
   

    <div class="row justify-content-center">
      <div class="col-md-6">
        <input type="text" id="verifyId" class="form-control mb-3" placeholder="Enter Certificate ID">
        <button id="verifyBtn" class="btn btn-success w-100">
          Verify Certificate
        </button>
      </div>
    </div>

    <div id="verificationResult" class="mt-4 text-center"></div>
  </div>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCPhxMv51PyNsOwImpmz5H0CFeoNHfFoYY",
    authDomain: "acadvault-backend.firebaseapp.com",
    projectId: "acadvault-backend",
    storageBucket: "acadvault-backend.firebasestorage.app",
    messagingSenderId: "216830101670",
    appId: "1:216830101670:web:1c921497490fd47560cc67"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const verifyBtn = document.getElementById("verifyBtn");
  const resultDiv = document.getElementById("verificationResult");
  const inputField = document.getElementById("verifyId");

  // 🔍 Common verify function
  async function verifyCertificate(id) {
  try {
  const docRef = doc(db, "certificates", id);
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    const data = docSnap.data();

    // ✅ Format date properly
    let formattedDate = "N/A";

    if (data.issuedAt && data.issuedAt.seconds) {
      const date = new Date(data.issuedAt.seconds * 1000);
      formattedDate = date.toLocaleDateString("en-GB", {
        day: "2-digit",
        month: "short",
        year: "numeric"
      });
    }

      resultDiv.innerHTML = `
  <div class="card shadow border-0 p-4 text-center">

    <h4 class="mb-3 ${
      data.status === "valid" ? "text-success" : "text-danger"
    }">
      ${data.status === "valid" ? "Certificate Verified" : "Certificate Revoked"}
    </h4>

    <div class="mt-3 text-start mx-auto" style="max-width: 320px;">

      <p class="mb-2">
        <strong>Name:</strong> ${data.studentName}
      </p>

      <p class="mb-2">
        <strong>Course:</strong> ${data.course}
      </p>

      <p class="mb-2">
        <strong>Year:</strong> ${data.year}
      </p>

      <p class="mb-2">
        <strong>Issued On:</strong> ${formattedDate}
      </p>

      <hr class="my-3">

      <p class="d-flex justify-content-between align-items-center mb-0">
        <strong>Status:</strong>
        ${
          data.status === "valid"
            ? '<span class="badge bg-success px-3 py-2">VALID</span>'
            : '<span class="badge bg-danger px-3 py-2">REVOKED</span>'
        }
      </p>

    </div>

  </div>
`;
    } else {
    resultDiv.innerHTML = `
      <div class="alert alert-danger">
        Invalid Certificate ❌
      </div>
    `;
  }

  } catch (error) {
    resultDiv.innerHTML = `
      <div class="alert alert-warning">
        Error verifying certificate. Please try again.
      </div>
    `;
  }
}

  // 🖱 Manual Button Click
  verifyBtn.addEventListener("click", async () => {
    const id = inputField.value.trim();

    if (!id) {
      resultDiv.innerHTML = "<p class='text-danger'>Please enter a Certificate ID.</p>";
      return;
    }

    verifyCertificate(id);
  });

  // ⌨️ Allow Enter key to trigger verification
inputField.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    verifyBtn.click();
  }
});

  // 📱 Auto verify if URL has ?id=
  const urlParams = new URLSearchParams(window.location.search);
  const certIdFromUrl = urlParams.get("id");

 if (certIdFromUrl) {
  inputField.value = certIdFromUrl;

  // Hide manual input section when opened via QR
  document.querySelector(".row").classList.add("d-none");

  verifyCertificate(certIdFromUrl);
}
</script>


<script src="assets/js/main.js" defer></script>
