<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Student Dashboard — AcadVault</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
  <div class="container d-flex justify-content-between">
    <span class="navbar-brand">AcadVault — Student Dashboard</span>

    <div>
      <a href="index.html" class="btn btn-outline-light btn-sm me-2">
        Home
      </a>
      <button id="logoutBtn" class="btn btn-outline-light btn-sm">
        Logout
      </button>
    </div>
  </div>
</nav>

<section class="py-5">
  <div class="container">
   <h3 class="mb-2">My Certificates</h3>
<p id="welcomeText" class="text-muted mb-4"></p>
    <div id="studentCertificates" class="row g-4"></div>
  </div>
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

import {
  getAuth,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
 apiKey: "AIzaSyCPhxMv51PyNsOwImpmz5H0CFeoNHfFoYY",
    authDomain: "acadvault-backend.firebaseapp.com",
    projectId: "acadvault-backend",
    storageBucket: "acadvault-backend.firebasestorage.app",
    messagingSenderId: "216830101670",
    appId: "1:216830101670:web:1c921497490fd47560cc67"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const container = document.getElementById("studentCertificates");
const logoutBtn = document.getElementById("logoutBtn");

logoutBtn.addEventListener("click", async () => {
  await signOut(auth);
  window.location.href = "index.html";
});

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  container.innerHTML = "";
  document.getElementById("welcomeText").textContent =
  "Logged in as: " + user.email;

  const q = query(
    collection(db, "certificates"),
    where("studentEmail", "==", user.email)
  );

  const snapshot = await getDocs(q);

  if (snapshot.empty) {
    container.innerHTML = "<p>No certificates found.</p>";
    return;
  }

  snapshot.forEach((docItem) => {
    const data = docItem.data();

    const card = `
  <div class="col-md-4">
    <div class="card shadow-sm">
      <div class="card-body">
        <h5>${data.studentName}</h5>
        <p><strong>Course:</strong> ${data.course}</p>
        <p><strong>Year:</strong> ${data.year}</p>

        <p class="small text-muted">
        Certificate ID: ${docItem.id}
        </p>

        <p>
          <strong>Status:</strong> 
          ${
            data.status === "valid"
              ? '<span class="badge bg-success">VALID</span>'
              : '<span class="badge bg-danger">REVOKED</span>'
          }
        </p>

        <a href="verify.html?id=${docItem.id}" class="btn btn-primary btn-sm mt-2">
        Verify Certificate
        </a>
      </div>
    </div>
  </div>
`;

    container.insertAdjacentHTML("beforeend", card);
  });
});
</script>

<script src="assets/js/main.js" defer></script>
<script type="module" src="assets/js/auth.js"></script>

</body>
</html>
